- name: Create metallb directory
  file:
    path: "{{ helm_chart_root }}/metallb"
    state: directory

- name: Copy metallb.tgz
  copy:
    src: ../../../../bin/k8s-node/packages/metallb.tgz
    dest: "{{ helm_chart_root }}/metallb"

- name: Set values.yml
  template:
    dest: "{{ helm_chart_root }}/metallb/values.yml"
    src: metallb/metallb-values.yml.j2
    owner: root
    mode: 0644

- name: Create metallb namespace
  command: "kubectl create ns metallb"

- name: Install metallb
  command: "helm install --namespace metallb metallb {{ helm_chart_root }}/metallb/metallb.tgz -f {{ helm_chart_root }}/metallb/values.yml"
